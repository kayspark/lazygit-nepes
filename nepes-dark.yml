# Nepes Dark — lazygit theme
# Copy to ~/.config/lazygit/config.yml under gui.theme

gui:
  theme:
    activeBorderColor:
      - "#6A84CA"
      - bold
    inactiveBorderColor:
      - "#787068"
    optionsTextColor:
      - "#6A84CA"
    selectedLineBgColor:
      - "#3E3A38"
    selectedRangeBgColor:
      - "#3E3A38"
    cherryPickedCommitBgColor:
      - "#2D7A82"
    cherryPickedCommitFgColor:
      - "#3A9BA5"
    unstagedChangesColor:
      - "#E1575C"
    defaultFgColor:
      - "#DCD8D4"
